trigger:
  branches:
    include:
      - main
      - master

pr:
  branches:
    include:
      - main
      - master

pool:
  vmImage: ubuntu-latest

variables:
  MAVEN_CACHE_FOLDER: $(Pipeline.Workspace)/.m2/repository

steps:
  - task: Cache@2
    inputs:
      key: 'maven | "$(Agent.OS)" | pom.xml'
      restoreKeys: |
        maven | "$(Agent.OS)"
      path: '$(MAVEN_CACHE_FOLDER)'
    displayName: Cache Maven dependencies

  - task: JavaToolInstaller@0
    inputs:
      versionSpec: '17'
      jdkArchitectureOption: 'x64'
      jdkSourceOption: 'PreInstalled'
    displayName: Use Java 17

  - script: |
      sudo apt-get update
      sudo apt-get install -y --no-install-recommends chromium chromium-driver
      chromium --version || true
    displayName: Install browser dependencies for Selenium

  - task: Maven@4
    inputs:
      mavenPomFile: 'pom.xml'
      goals: 'clean verify -Pci'
      options: '-Dmaven.repo.local=$(MAVEN_CACHE_FOLDER)'
      publishJUnitResults: true
      testResultsFiles: '**/surefire-reports/*.xml'
      codeCoverageToolOption: 'JaCoCo'
      javaHomeOption: 'JDKVersion'
      jdkVersionOption: '1.17'
      mavenVersionOption: 'Default'
    displayName: Run Maven tests

  - script: |
      docker --version
      docker build -t selenium-restassured-demo .
    displayName: Build Docker image
    condition: succeeded()

  - task: PublishTestResults@2
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: '**/surefire-reports/*.xml'
      testRunTitle: 'Selenium REST Assured Demo'

  - task: PublishCodeCoverageResults@2
    inputs:
      summaryFileLocation: 'target/site/jacoco/jacoco.xml'
      pathToSources: 'src'
    displayName: Publish code coverage
