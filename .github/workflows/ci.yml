name: Code Review

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run tests and generate report
        run: mvn clean verify -Pci

      - name: Upload HTML report artifact
        uses: actions/upload-artifact@v4
        with:
          name: surefire-report
          path: target/site/surefire-report.html

  ai-review:
    name: Copilot enterprise code review
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed directories
        uses: dorny/paths-filter@v3
        id: changes
        with:
          list-files: json
          filters: |
            src:
              - 'src/**'
            web:
              - 'src/test/java/com/example/automation/web/**'
            api:
              - 'src/test/java/com/example/automation/api/**'
            testng:
              - 'src/test/java/com/example/automation/testng/**'
            pom:
              - 'pom.xml'
            workflow:
              - '.github/workflows/**'

      - name: Build review summary
        id: review-summary
        shell: bash
        run: |
          dirs=""
          if [ "${{ steps.changes.outputs.src }}" = "true" ]; then dirs="$dirs src"; fi
          if [ "${{ steps.changes.outputs.web }}" = "true" ]; then dirs="$dirs web"; fi
          if [ "${{ steps.changes.outputs.api }}" = "true" ]; then dirs="$dirs api"; fi
          if [ "${{ steps.changes.outputs.testng }}" = "true" ]; then dirs="$dirs testng"; fi
          if [ "${{ steps.changes.outputs.pom }}" = "true" ]; then dirs="$dirs pom"; fi
          if [ "${{ steps.changes.outputs.workflow }}" = "true" ]; then dirs="$dirs workflow"; fi
          if [ -z "$dirs" ]; then dirs="none"; fi
          echo "changed_dirs=$dirs" >> "$GITHUB_OUTPUT"

      - name: Run compile quality gate
        run: mvn -q -DskipTests compile

      - name: Generate Copilot enterprise review context
        env:
          CHANGED_DIRS: ${{ steps.review-summary.outputs.changed_dirs }}
        run: |
          cat > review-context.md <<EOF
          # Copilot enterprise review context

          Repository: ${{ github.repository }}
          Event: ${{ github.event_name }}
          Ref: ${{ github.ref }}
          Changed directories: ${CHANGED_DIRS}

          Review priorities:
          - Java 17 / Maven compatibility
          - Selenium UI test stability in CI
          - REST Assured API test isolation
          - Workflow security and minimal permissions
          - Maintainability of page-object and test structure
          EOF

      - name: Post Copilot-style review summary to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          CHANGED_DIRS: ${{ steps.review-summary.outputs.changed_dirs }}
        with:
          script: |
            const dirs = process.env.CHANGED_DIRS || 'none';
            const body = [
              '## Copilot enterprise review',
              '',
              `Changed directories: ${dirs}`,
              '',
              '- Compile quality gate passed via `mvn -q -DskipTests compile`.',
              '- Review context is available in the workflow artifact for Enterprise Copilot analysis.',
              '- Test execution is still handled by the main CI job.',
              '',
              '> This workflow is prepared for GitHub Copilot Enterprise usage by keeping a repository review instruction file in `.github/copilot-instructions.md` and by exporting structured review context for downstream enterprise review automation.'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
